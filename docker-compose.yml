version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: currency_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: currencies
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: currency_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/currencies
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: currency_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
